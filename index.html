<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch A Sketch</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        .grid-container {
            display: flex;
            flex-wrap: wrap;
            width: 960px;
            height: 960px;
            border: 2px solid black;
            padding: 0;
            margin: 0;
        }

        .grid-square {
            flex: 1 1 0px;
            box-sizing: border-box;
            border: 0.1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="resetBtn">Reset Grid</button>
        <div id="gridContainer" class="grid-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
